# 局域网：其他设备用 http://<本机局域网IP>:8000/fund/ 访问（防火墙需放行 8000）
# 开发：npm start 已默认 HOST=0.0.0.0，局域网可访问 http://<本机IP>:8000/fund/（端口以控制台为准）
services:
  fund-strategy:
    container_name: fund_strategy_instance
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    ports:
      - "8888:80"
    restart: unless-stopped
