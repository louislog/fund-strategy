# 与 .umirc.ts 中 publicPath: '/fund/' 对齐：静态资源挂在 /fund/ 下
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    charset utf-8;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;
    gzip_min_length 1024;

    # 根路径引导到应用前缀，避免用户打开 / 时 404
    location = / {
        return 302 /fund/;
    }

    location /fund/ {
        try_files $uri $uri/ /fund/index.html;
    }

    location = /healthz {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
